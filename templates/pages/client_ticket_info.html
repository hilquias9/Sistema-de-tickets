{% if ticket %}
        <div class="selected_ticket">
            <h2>{{ticket[0]}}</h2>
            <h3>{{ticket[2]}}</h3>
            <h4>{{ticket[1]}}</h4>
        </div>
        <div>
            {% if answers %}
            <h2>Respostas</h2>
            <h4>Autor</h4>
            <h4>Resposta</h4>
            {% endif %}
        </div>
        {% else %}
        <div>
            <h4>Nenhum ticket selecionado.</h4>
        </div>
{% endif %}
